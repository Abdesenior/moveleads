name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

# Only one deploy at a time
concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  # ── 1. Build gate: must pass before smoke test ────────────────────────────
  build-check:
    name: Pre-deploy build check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install client deps
        working-directory: client
        run: npm ci

      - name: Vite production build
        working-directory: client
        run: npm run build
        env:
          VITE_API_URL: https://api.moveleads.cloud
          VITE_GOOGLE_MAPS_API_KEY: ${{ secrets.VITE_GOOGLE_MAPS_API_KEY }}

  # ── 2. (Optional) Trigger Render deploy hook if secret is configured ──────
  #      Render can also auto-deploy via its native GitHub integration.
  #      Set RENDER_DEPLOY_HOOK_URL in repo secrets to enable this step.
  deploy-backend:
    name: Deploy API → Render
    runs-on: ubuntu-latest
    needs: build-check
    env:
      RENDER_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
    steps:
      - name: Trigger Render deploy hook (if configured)
        run: |
          if [ -z "$RENDER_HOOK" ]; then
            echo "RENDER_DEPLOY_HOOK_URL not set — Render is deploying via native Git integration."
            exit 0
          fi
          curl -fsSL -X POST "$RENDER_HOOK" \
            -o /dev/null -w "Render deploy triggered: HTTP %{http_code}\n"

  # ── 3. (Optional) Deploy frontend to Vercel if token is configured ────────
  #      Vercel auto-deploys via its native GitHub integration when no token
  #      is provided here. Add VERCEL_TOKEN + VERCEL_ORG_ID + VERCEL_PROJECT_ID
  #      to repo secrets to use this CI-driven deploy instead.
  deploy-frontend:
    name: Deploy UI → Vercel (moveleads.cloud)
    runs-on: ubuntu-latest
    needs: build-check
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    steps:
      - name: Skip — Vercel deploying via native Git integration
        if: env.VERCEL_TOKEN == ''
        run: echo "VERCEL_TOKEN not set — Vercel is deploying automatically from GitHub. No action needed."

      - uses: actions/checkout@v4
        if: env.VERCEL_TOKEN != ''

      - uses: actions/setup-node@v4
        if: env.VERCEL_TOKEN != ''
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install Vercel CLI
        if: env.VERCEL_TOKEN != ''
        run: npm install -g vercel@latest

      - name: Pull Vercel project settings
        if: env.VERCEL_TOKEN != ''
        working-directory: client
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build for Vercel
        if: env.VERCEL_TOKEN != ''
        working-directory: client
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy to Vercel production
        if: env.VERCEL_TOKEN != ''
        working-directory: client
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

  # ── 4. Smoke test — waits for both platforms then hits health endpoints ────
  smoke-test:
    name: Smoke test production
    runs-on: ubuntu-latest
    needs: [deploy-backend, deploy-frontend]
    steps:
      - name: Wait for deploys to propagate
        run: sleep 45

      - name: API health check
        run: |
          STATUS=$(curl -sf -o /dev/null -w "%{http_code}" https://api.moveleads.cloud/)
          echo "API responded: HTTP $STATUS"
          [ "$STATUS" = "200" ] || (echo "API health check FAILED" && exit 1)

      - name: Frontend health check
        run: |
          STATUS=$(curl -sf -o /dev/null -w "%{http_code}" https://moveleads.cloud/)
          echo "Frontend responded: HTTP $STATUS"
          [ "$STATUS" = "200" ] || (echo "Frontend health check FAILED" && exit 1)
