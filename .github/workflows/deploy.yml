name: Deploy to Production

on:
  push:
    branches: [main]
  # Allow manual trigger from GitHub Actions UI
  workflow_dispatch:

# Only one deploy at a time
concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  # ── 1. Gate: build must pass before deploying ─────────────────────────────
  build-check:
    name: Pre-deploy build check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install client deps
        working-directory: client
        run: npm ci

      - name: Vite production build
        working-directory: client
        run: npm run build
        env:
          VITE_API_URL: https://api.moveleads.cloud
          VITE_GOOGLE_MAPS_API_KEY: ${{ secrets.VITE_GOOGLE_MAPS_API_KEY }}

  # ── 2. Deploy backend to Render ───────────────────────────────────────────
  deploy-backend:
    name: Deploy API → Render
    runs-on: ubuntu-latest
    needs: build-check
    steps:
      - name: Trigger Render deploy hook
        # Create this deploy hook in:
        #   Render Dashboard → moveleads-api → Settings → Deploy Hook
        # Then save the URL as RENDER_DEPLOY_HOOK_URL in GitHub repo secrets.
        run: |
          curl -fsSL -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" \
            -o /dev/null -w "Render deploy triggered: HTTP %{http_code}\n"

  # ── 3. Deploy frontend to Vercel ─────────────────────────────────────────
  deploy-frontend:
    name: Deploy UI → Vercel (moveleads.cloud)
    runs-on: ubuntu-latest
    needs: build-check
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel project settings
        working-directory: client
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build for Vercel
        working-directory: client
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy to Vercel production
        working-directory: client
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

  # ── 4. Post-deploy smoke test ─────────────────────────────────────────────
  smoke-test:
    name: Smoke test production
    runs-on: ubuntu-latest
    needs: [deploy-backend, deploy-frontend]
    steps:
      - name: Wait for Render to finish starting
        run: sleep 30

      - name: API health check
        run: |
          STATUS=$(curl -sf -o /dev/null -w "%{http_code}" https://api.moveleads.cloud/)
          echo "API responded: HTTP $STATUS"
          [ "$STATUS" = "200" ] || (echo "API health check FAILED" && exit 1)

      - name: Frontend health check
        run: |
          STATUS=$(curl -sf -o /dev/null -w "%{http_code}" https://moveleads.cloud/)
          echo "Frontend responded: HTTP $STATUS"
          [ "$STATUS" = "200" ] || (echo "Frontend health check FAILED" && exit 1)
